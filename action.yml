name: "shutup-mcp Tool Filter"
description: "Filter MCP tools for a task intent using shutup-mcp"
author: "hjs-spec"

branding:
  icon: "filter"
  color: "gray-dark"

inputs:
  config:
    description: "Path to your MCP config file"
    required: true
  intent:
    description: "Description of the user task"
    required: true
  top_k:
    description: "Number of relevant tools to return"
    required: false
    default: "5"
  embedder:
    description: "Embedding backend: sentence-transformers, ollama, or fake"
    required: false
    default: "sentence-transformers"

outputs:
  filtered_tools:
    description: "JSON array of filtered tool definitions"
  tool_count:
    description: "Number of tools returned"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install shutup-mcp
      run: pip install shutup-mcp
      shell: bash
    - name: Run shutup
      id: filter
      run: |
        shutup --config "${{ inputs.config }}" --intent "${{ inputs.intent }}" --top-k "${{ inputs.top_k }}" --embedder "${{ inputs.embedder }}" > /tmp/shutup-tools.json
        count=$(python -c 'import json; print(len(json.load(open("/tmp/shutup-tools.json"))))')
        {
          echo "filtered_tools<<EOF"
          cat /tmp/shutup-tools.json
          echo "EOF"
          echo "tool_count=$count"
        } >> "$GITHUB_OUTPUT"
      shell: bash
